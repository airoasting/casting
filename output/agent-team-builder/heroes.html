<body><div class="wrap">
  <h1>히어로 8명 · 프로페셔널 픽셀 캐릭터</h1>
  <p class="sub">성인 비율(작은 머리·긴 목·넓은 어깨), 절제된 눈, 침착한 표정, 채도 낮춘 에디토리얼 팔레트, 무광 스튜디오 배경. 동양인 남녀 혼합. 마우스를 올리면 차분하게 움직입니다.</p>

<script>
(function(){
"use strict";
function R(x,y,w,h,c){return '<rect x="'+x+'" y="'+y+'" width="'+(w||1)+'" height="'+(h||1)+'" fill="'+c+'"/>';}
var OUT='#26201a';
function painter(){
  var G=48,M={};
  function em(map){var rows={};for(var kk in map){var pp=kk.split(',');(rows[+pp[1]]=rows[+pp[1]]||[]).push([+pp[0],map[kk]]);}var o='';for(var y in rows){var ar=rows[y].sort(function(a,b){return a[0]-b[0];});var i=0;while(i<ar.length){var x0=ar[i][0],c=ar[i][1],w=1;while(i+w<ar.length&&ar[i+w][0]===x0+w&&ar[i+w][1]===c)w++;o+=R(x0,+y,w,1,c);i+=w;}}return o;}
  var api={G:G,M:M,
    P:function(x,y,c){if(x<0||y<0||x>=G||y>=G||!c)return;M[x+','+y]=c;},
    H:function(y,x,w,c){for(var i=0;i<w;i++)api.P(x+i,y,c);},
    C:function(a,c){for(var i=0;i<a.length;i++)api.P(a[i][0],a[i][1],c);},
    body:function(){
      var O={},key,p,x,y,j,nb;
      for(key in M){p=key.split(',');x=+p[0];y=+p[1];nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
        for(j=0;j<4;j++){if(nb[j][0]>=0&&nb[j][1]>=0&&nb[j][0]<G&&nb[j][1]<G&&!M[nb[j][0]+','+nb[j][1]])O[nb[j][0]+','+nb[j][1]]=OUT;}}
      var rim={},sha={},mk,mp,mx,my,up,lf,dn,rt;
      for(mk in M){mp=mk.split(',');mx=+mp[0];my=+mp[1];up=M[mx+','+(my-1)];lf=M[(mx-1)+','+my];dn=M[mx+','+(my+1)];rt=M[(mx+1)+','+my];
        if(!up||!lf)rim[mk]='rgba(255,255,255,.14)';else if(!dn||!rt)sha[mk]='rgba(0,0,0,.13)';}
      return em(O)+em(M)+em(rim)+em(sha);
    }};
  return api;
}
// 성인 비율 얼굴 (jaw: r/s/p) — 무블러시, 절제된 음영
function face(p,SK,opt){
  opt=opt||{};
  var b=SK.b,s=SK.s,s2=SK.s2,l=SK.l, jaw=opt.jaw||'r';
  var top=[[6,20,8],[7,18,12],[8,17,14],[9,16,16],[10,16,16],[11,16,16],[12,16,16],[13,16,16],[14,16,16],[15,16,16],[16,16,16],[17,16,16],[18,16,16]];
  for(var i=0;i<top.length;i++)p.H(top[i][0],top[i][1],top[i][2],b);
  var jr;
  if(jaw==='p') jr=[[19,17,14],[20,18,12],[21,20,8],[22,21,6],[23,22,4],[24,23,2]];
  else if(jaw==='s') jr=[[19,16,16],[20,17,14],[21,18,12],[22,20,8],[23,22,4]];
  else jr=[[19,17,14],[20,18,12],[21,19,10],[22,20,8],[23,22,4]];
  for(i=0;i<jr.length;i++)p.H(jr[i][0],jr[i][1],jr[i][2],b);
  p.C([[15,14],[15,15],[15,16],[32,14],[32,15],[32,16]],b); // 귀
  var ny=(jaw==='p')?24:23;
  p.H(ny,21,6,b);p.H(ny+1,21,6,b);p.H(ny+2,21,6,s); // 긴 목
  // 음영(우/측, 절제)
  p.C([[30,10],[30,11],[30,12],[30,13],[30,14],[30,15],[30,16],[31,11],[31,12],[31,13],[31,14],[29,17],[30,17],[28,18],[29,18],[27,19]],s);
  p.C([[24,20],[25,20],[24,21],[25,21]],s2); // 턱 그림자
  // 하이라이트(이마/좌, 미세)
  p.C([[18,9],[19,9],[20,9],[18,10],[17,11],[18,11]],l);
  // 코
  p.C([[24,17],[24,18]],s);p.C([[23,16]],l);
  // 입 / 입술 (절제)
  var my=(jaw==='p')?21:20;
  if(opt.fem){
    p.C([[22,my],[23,my],[24,my]],'#b07b72');p.C([[23,my+1]],'#9a6157');
  } else {
    p.C([[22,my],[23,my],[24,my]],'#a07a68');
  }
}
// 작고 차분한 눈
function eyes(SK,opt){
  opt=opt||{};
  var s=SK.s,iris='#2b2620',brow=opt.brow||'#2b2620';
  var t='';
  function C(a,c){for(var i=0;i<a.length;i++)t+=R(a[i][0],a[i][1],1,1,c);}
  C([[18,12],[19,12],[20,12]],brow);C([[27,12],[28,12],[29,12]],brow); // 눈썹
  C([[19,14],[20,14],[27,14],[28,14]],s);  // 윗 눈꺼풀 음영
  C([[19,15],[20,15]],iris);C([[27,15],[28,15]],iris); // 눈
  if(opt.fem)C([[18,15],[29,15]],s); // 바깥 끝(절제)
  C([[20,15]],'#6b5f52');C([[28,15]],'#6b5f52'); // 미세 하이라이트
  return t;
}
// 비즈니스 캐주얼 (shirt / cardigan / blazer)
function cloth(p,cb,cs,ch,type){
  type=type||'shirt';var WS='#ece7db',WSs='#d4cdbd';
  var rows=[[29,18,12],[30,15,18],[31,12,24],[32,10,28],[33,8,32],[34,7,34],[35,6,36],[36,5,38],[37,5,38],[38,4,40],[39,4,40],[40,4,40],[41,4,40],[42,4,40],[43,4,40],[44,4,40],[45,4,40],[46,4,40],[47,4,40]];
  for(var i=0;i<rows.length;i++)p.H(rows[i][0],rows[i][1],rows[i][2],cb);
  p.H(28,21,6,cs); // 목밑 그림자
  p.C([[8,36],[7,37],[6,38],[6,39],[5,40],[5,41],[5,42]],ch);     // 좌 하이라이트
  p.C([[39,36],[40,37],[41,38],[41,39],[42,40],[42,41],[42,42]],cs); // 우 그림자
  if(type==='cardigan'){
    p.C([[22,31],[23,31],[24,31],[25,31],[23,32],[24,32],[23,33],[24,33]],WS);
    p.C([[21,30],[22,30],[26,30],[27,30],[21,31],[27,31]],WS);
    p.C([[20,31],[21,32],[22,33],[23,34],[27,31],[26,32],[25,33],[24,34]],cs);
    p.C([[23,35]],cs);
  } else if(type==='blazer'){
    p.C([[22,31],[23,31],[24,31],[25,31],[23,32],[24,32],[24,33]],WS);
    p.C([[21,30],[22,30],[25,30],[26,30]],WS);
    p.C([[20,31],[21,32],[22,33],[23,34],[27,31],[26,32],[25,33],[24,34]],cs);
    p.C([[19,32],[20,33],[28,32],[27,33]],ch);
  } else {
    p.C([[21,30],[22,30],[26,30],[27,30],[22,31],[26,31]],ch);
    p.C([[23,29],[24,29],[25,29]],ch);
    p.C([[24,31],[24,32],[24,33],[24,34],[24,35]],cs);
    p.C([[24,32],[24,34]],WS);
  }
}
// 좌상단 역할 아이콘 (절제된 모노 엠블럼)
function icon(p,type,D){
  function C(a,c){p.C(a,c);}
  if(type==='mag'){C([[4,4],[5,4],[3,5],[6,5],[3,6],[6,6],[4,7],[5,7],[6,7],[7,8]],D);C([[4,5],[5,5],[4,6],[5,6]],'#c4d2dc');}
  else if(type==='bars'){C([[3,8],[3,9],[4,7],[4,8],[4,9],[5,6],[5,7],[5,8],[5,9],[6,5],[6,6],[6,7],[6,8],[6,9]],D);}
  else if(type==='coin'){C([[4,4],[5,4],[3,5],[6,5],[3,6],[6,6],[4,7],[5,7]],D);C([[4,5],[5,5],[4,6],[5,6]],'#d8b24e');C([[5,5],[4,6]],D);}
  else if(type==='pen'){C([[7,4],[6,4],[7,5],[6,5],[5,6],[4,7],[3,8],[4,8]],D);C([[3,8]],'#cfa64e');}
  else if(type==='bubble'){C([[3,4],[4,4],[5,4],[6,4],[7,4],[3,5],[7,5],[3,6],[4,6],[5,6],[6,6],[7,6],[4,7]],D);}
  else if(type==='flag'){C([[3,4],[3,5],[3,6],[3,7],[3,8],[3,9]],D);C([[4,4],[5,4],[6,4],[7,4],[4,5],[5,5],[6,5]],D);}
  else if(type==='gear'){C([[5,4],[3,5],[4,5],[5,5],[6,5],[7,5],[3,6],[4,6],[6,6],[7,6],[3,7],[4,7],[5,7],[6,7],[7,7],[5,8]],D);}
  else{C([[3,6],[3,7],[4,7],[4,8],[5,8],[5,7],[6,6],[6,5],[7,4],[7,5]],D);}
}

var HEROES=[
{nm:'리서치 어시스턴트',en:'Research Assistant',cat:'리서치·정보',col:'#3f736d',g1:'#e4ebe8',g2:'#c5d2cd',

   p.C([[26,14],[27,14],[28,14],[29,14],[30,14],[26,15],[30,15],[26,16],[27,16],[28,16],[29,16],[30,16]],GF);
   p.C([[22,15],[23,15],[24,15],[25,15],[16,15],[31,15]],GF);
   icon(p,'check','#28323c');
   return {body:p.body(),eyes:ev,m:1};
 }}
];

var grid=document.getElementById('grid');
HEROES.forEach(function(H,i){
  var p=painter(); var r=H.draw(p);
  var svg='<svg class="hero px-m'+r.m+'" viewBox="0 0 48 48" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><radialGradient id="g'+i+'" cx="50%" cy="40%" r="68%">'
    +'<stop offset="0%" stop-color="'+H.g1+'"/><stop offset="100%" stop-color="'+H.g2+'"/></radialGradient></defs>'
    +'<rect x="0" y="0" width="48" height="48" fill="url(#g'+i+')"/>'
    +'<g class="px-all">'+r.body+'<g class="px-eyes">'+r.eyes+'</g></g></svg>';
  var cell=document.createElement('div'); cell.className='cell';
  cell.innerHTML=svg+'<div class="nm">'+H.nm+'</div><div class="en">'+H.en+'</div>'
    +'<div class="cat"><span class="dot" style="background:'+H.col+'"></span>'+H.cat+'</div>';
  grid.appendChild(cell);
});
})();
</script>
